<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg"
     width="1024" height="1024" viewBox="0 0 1024 1024" version="1.1">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#fff6a8"/>
      <stop offset="10%" stop-color="#ffe76a"/>
      <stop offset="35%" stop-color="#ffd400"/>
      <stop offset="65%" stop-color="#f0b800"/>
      <stop offset="100%" stop-color="#a56a00"/>
    </linearGradient>
    <linearGradient id="shadow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#6d3f00" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#2a1800" stop-opacity="0.55"/>
    </linearGradient>
    <linearGradient id="highlight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="45%"  stop-color="#fff7b8" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Shadow / depth -->
  <g stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#softGlow)">
    <path d="M 310 840 L 560 205" stroke="url(#shadow)" stroke-width="190"/>
    <path d="M 760 840 L 560 205" stroke="url(#shadow)" stroke-width="190"/>
    <path d="M 180 595 L 705 595" stroke="url(#shadow)" stroke-width="160"/>
  </g>

  <!-- Main gold body -->
  <g stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M 290 820 L 545 190" stroke="url(#gold)" stroke-width="165"/>
    <path d="M 740 820 L 545 190" stroke="url(#gold)" stroke-width="165"/>
    <path d="M 170 585 L 690 585" stroke="url(#gold)" stroke-width="140"/>
  </g>

  <!-- Inner warm contour -->
  <g stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.95">
    <path d="M 308 816 L 546 218" stroke="#c68100" stroke-width="110"/>
    <path d="M 722 816 L 546 218" stroke="#c68100" stroke-width="110"/>
    <path d="M 195 585 L 670 585" stroke="#c68100" stroke-width="92"/>
  </g>

  <!-- Gloss highlight -->
  <g stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.9">
    <path d="M 255 760 L 500 250" stroke="url(#highlight)" stroke-width="24"/>
    <path d="M 205 548 L 635 548" stroke="#fff7b8" opacity="0.7" stroke-width="14"/>
  </g>
</svg>
